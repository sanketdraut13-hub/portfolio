<!DOCTYPE html>
    <html lang="en">
         <head>

            <title>My Portfolio</title>

            <style>
                * {
                    margin: 0;
                    padding: 0;
                    box-sizing: border-box;
                  }

                body {
                    font-family: Arial, sans-serif;
                    overflow-x: hidden;
                    }


                body::before {
                    content: "";
                    position: fixed;
                    top: 0;
                    right: 0;
                    width: 50%;
                    height: 100%;
                    background: url("indexpage-background2.jpg") center/cover no-repeat;
                    z-index: -1;
                }


                .navigation {
                    position: absolute;
                    width: 100%;
                    top: 0;
                    display: flex;
                    justify-content: center;
                    padding: 20px;
                    z-index: 10;
                    background-color: black;
                }

                nav {
                    display: flex;
                    gap: 20px;
                }

                nav a {
                    color: aliceblue;
                    text-decoration: none;
                    font-size: 18px;
                    padding: 12px 18px;
                    background-color: #1a1a1a;
                    border-radius: 10px;
                    transition: all 0.3s ease-in-out;;
                }

                nav a:hover {
                    background-color: #333;
                    }


                nav a:hover {
                    background: rgba(255,255,255,0.3);
                    background-color: rgba(65, 65, 65, 0.1);
                    border-radius: 15px;
                    padding: 25px;
                }


                #main {
                    display: flex;
                    min-height: 100vh;
                    padding-top: 40px;
                    }

                .indexleft {
                    width: 50%;
                    background: aliceblue;
                    padding: 120px 40px 40px;
                    display: flex;
                    flex-direction: column;
                    justify-content: space-between;
                    }


                h1 {
                   font-size: 180px;
                   font-family: fantasy;
                   line-height: 0.9;
                   }


                .bottom {
                   text-align: center;
                }

                .bottom p {
                    font-size: 18px;
                    margin-bottom: 20px;
                }   

                 button {
                    padding: 12px 25px;
                    background: black;
                    color: white;
                    border: none;
                    border-radius: 8px;
                    cursor: pointer;
                }

                button:hover {
                    background: #333;
                }


                .indexright {
                     width: 50%;
                     display: flex;
                     align-items: center;
                     justify-content: center;
                     padding: 40px;
                 }

                .indexright p {
                     color: white;
                     font-size: 32px;
                     font-weight: bold;
                     max-width: 600px;
                }


             @media (max-width: 768px) {
                body::before {
                    width: 100%;
                    }

                #main {
                    flex-direction: column;
                      }

                .indexleft, .indexright {
                    width: 100%;
                     }

                h1 {
                   font-size: 80px;
                   text-align: center;
                   }

                .indexright p {
                    font-size: 20px;
                    text-align: center;
                   }
                }
            </style>
        </head>

            <body>

      <div class="navigation">
         <nav>
             <a href="index.html" class="a1">Home</a>
            <a href="Achievments.html" class="a1">Achievements</a>
            <a href="Projects.html" class="a1">Projects</a>
            <a href="contact.html" class="a1">Contact</a>
            </nav>
       </div>

       <div id="main">

    <div class="indexleft">
        <h1>PORT<br>FOLIO</h1>

        <div class="bottom">
            <p>
                Aspiring professional committed to continuous learning, innovation, and skill development.
            </p>
            <button onclick="location.href='Main_page.html'">View Profile</button>
        </div>
    </div>

    <div class="indexright">
        <p>
            Step into my world of learning, innovation, and development — discover my profile, skills, and aspirations in the field of software engineering.
        </p>
    </div>

</div>

            </body>
</html>
