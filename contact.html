<!DOCTYPE html>
<html>
<head>
    <title>Contact</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f2f2f2;
        }

        .navigation {
            width: 100%;
            background-color: black;
            padding: 15px 0;
            display: flex;
            justify-content: center;
        }

        nav {
            display: flex;
            gap: 20px;
        }

        nav a {
            color: white;
            text-decoration: none;
            padding: 10px 18px;
            background-color: #1a1a1a;
            border-radius: 8px;
            transition: 0.3s;
        }

        nav a:hover {
            background-color: #333;
        }

        
        .container {
            width: 500px;
            margin: 80px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        
        .row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .row input {
            width: 100%;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }

        textarea {
            height: 120px;
            resize: none;
        }

        
        button {
            display: block;
            margin: 20px auto 0;
            padding: 10px 20px;
            border: none;
            background-color: #2ea3c7;
            color: white;
            font-size: 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #1c7c9a;
        }

    </style>
</head>

<body>


    <div class="navigation">
        <nav>
            <a href="index.html">Home</a>
            <a href="Achievments.html">Achievements</a>
            <a href="Projects.html">Projects</a>
            <a href="contact.html">Contact</a>
        </nav>
    </div>


    <div class="container">
        <form>
            <h2>Contact Form</h2>

            <div class="row">
                <input type="text" placeholder="Your Name">
                <input type="email" placeholder="Your Email">
            </div>

            <input type="text" placeholder="Subject">

            <br><br>

            <textarea placeholder="Message"></textarea>

            <button type="submit">Send Message</button>
        </form>
    </div>
    <footer>
            <p style="font-size: 20px; background-color: black;color: aliceblue; text-align: center; padding: 50px; margin: 0px;">
                © Copyright Sanket's Portfolio | Designed by Sanket
            </p>
        </footer>

</body>
</html>
